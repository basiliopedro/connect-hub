<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Hub — Entrar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #F4F6F7;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .topo {
      background: #0D1B2A;
      padding: 20px 24px 24px;
      text-align: center;
    }

    .logo { color: #fff; font-size: 22px; font-weight: bold; letter-spacing: 1px; }
    .logo span { color: #2E86C1; }
    .topo-sub { color: #AED6F1; font-size: 13px; margin-top: 6px; font-style: italic; }

    .corpo { padding: 28px 24px; }

    .titulo { font-size: 22px; font-weight: bold; color: #0D1B2A; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #839192; margin-bottom: 28px; }

    .campo { margin-bottom: 16px; }

    .campo label {
      display: block;
      font-size: 12px;
      color: #1B4F72;
      font-weight: 600;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .campo input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #ddd;
      border-radius: 12px;
      font-size: 15px;
      background: #fff;
      color: #0D1B2A;
      outline: none;
    }

    .campo input:focus { border-color: #2E86C1; }

    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 48px; }
    .password-wrap i {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #839192;
      cursor: pointer;
      font-size: 18px;
    }

    .link-recuperar {
      text-align: right;
      margin-top: 6px;
    }

    .link-recuperar a {
      font-size: 12px;
      color: #2E86C1;
      text-decoration: none;
      font-weight: 600;
    }

    .btn-entrar {
      width: 100%;
      padding: 16px;
      background: #2E86C1;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .divisor {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }

    .divisor hr { flex: 1; border: none; border-top: 1px solid #ddd; }
    .divisor span { font-size: 12px; color: #839192; }

    .link-registo {
      text-align: center;
      font-size: 14px;
      color: #839192;
    }

    .link-registo a {
      color: #2E86C1;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="topo">
    <div class="logo">CONNECT <span>HUB</span></div>
    <div class="topo-sub">Bem-vindo de volta</div>
  </div>

  <div class="corpo">
    <div class="titulo">Entrar</div>
    <div class="sub">Acede à tua conta para continuar.</div>

    <div class="campo">
      <label>Email ou Telefone</label>
      <input type="text" placeholder="Email ou número de telefone">
    </div>

    <div class="campo">
      <label>Password</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="A tua password">
        <i class="fa-solid fa-eye" id="olho" onclick="togglePassword()"></i>
      </div>
      <div class="link-recuperar">
        <a href="recuperar.html">Esqueceste a password?</a>
      </div>
    </div>

    <button class="btn-entrar" onclick="window.location.href='inicio.html'">
      <i class="fa-solid fa-right-to-bracket"></i>
      Entrar
    </button>

    <div class="divisor">
      <hr><span>ou</span><hr>
    </div>

    <div class="link-registo">
      Ainda não tens conta? <a href="registro.html">Criar conta</a>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const olho = document.getElementById('olho');
      if (input.type === 'password') {
        input.type = 'text';
        olho.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        olho.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }
  </script>

</body>
  </html>
