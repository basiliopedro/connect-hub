<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - Connect Hub</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/ui.css">
<script src="firebase-config.js"></script>
<script defer src="js/auth.js"></script>
</head>

<body>

<div class="app-navbar">
  <div class="logo">CONNECT HUB</div>
</div>

<div class="app-container">

  <div class="app-card">
    <h2>Entrar</h2>

    <input type="email" id="email" class="app-input" placeholder="Email">
    <input type="password" id="password" class="app-input" placeholder="Senha">

    <button onclick="login()" class="app-btn">
      Entrar
    </button>

  </div>

</div>

</body>
</html>
